name: ML Pipeline - Validate & Controlled Training

on:
  push:
    branches:
      - "**"

jobs:
  # Job 1: Linter (Lightweight Gatekeeper)

  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install flake8

      - name: Run linter
        run: |
          flake8 .

  # Job 2: Train (Expensive GPU Job - Controlled Execution)
  
  train:
    needs: linter
    runs-on: ubuntu-latest

    if: |
      needs.linter.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run training
        run: |
          echo "Starting training..."
          # simulate training
          python train.py

      # ❌ On Failure → Upload Logs
      - name: Save error logs
        if: failure()
        run: |
          echo "Training failed. Check logs." > error_logs.txt

      - name: Upload error logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: training-error-logs
          path: error_logs.txt

      # 🧹 Always Cleanup
      - name: Cleanup resources
        if: always()
        run: |
          echo "Cleaning up temporary cloud volumes..."